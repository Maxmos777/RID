name: rid-platform

# =============================================================================
# Rede partilhada entre todos os serviços
# =============================================================================
networks:
  rid-network:
    driver: bridge

# =============================================================================
# Volumes persistentes
# =============================================================================
volumes:
  pgdata:
    driver: local
  redis-data:
    driver: local

# =============================================================================
# Extensões Compose (âncoras reutilizáveis)
# =============================================================================
x-backend-build: &backend_build
  context: ./backend
  dockerfile: Dockerfile
  target: production

# =============================================================================
# Serviços
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — base de dados principal
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: rid-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rid
      POSTGRES_PASSWORD: rid
      POSTGRES_DB: rid
      # Palavra-passe do role PostgreSQL dedicado ao Langflow (schema langflow na mesma DB rid).
      LANGFLOW_DB_PASSWORD: ${LANGFLOW_DB_PASSWORD:-langflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # host:5433 -> container:5432 (evita conflito com PG local)
    networks:
      - rid-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rid -d rid"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis 7 — cache + sessões
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rid-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    networks:
      - rid-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Backend — Django 6 + FastAPI via Uvicorn ASGI
  # ---------------------------------------------------------------------------
  backend:
    build: *backend_build
    container_name: rid-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Sobrepõe os hosts do .env para apontar para os containers
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    networks:
      - rid-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Langflow — DDL idempotente (fonte única: Django manage.py)
  # ---------------------------------------------------------------------------
  langflow-pg-bootstrap:
    profiles:
      - langflow
    build: *backend_build
    container_name: rid-langflow-pg-bootstrap
    restart: "no"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      LANGFLOW_DB_PASSWORD: ${LANGFLOW_DB_PASSWORD:-langflow}
    command: ["python", "manage.py", "ensure_langflow_schema"]
    networks:
      - rid-network
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Langflow — plataforma de fluxos LLM (perfil opcional)
  # ---------------------------------------------------------------------------
  langflow:
    image: langflowai/langflow:1.8.3-rid   # imagem customizada RID (ADR-008)
    build:
      context: ./langflow-custom
      dockerfile: Dockerfile.langflow
      args:
        LANGFLOW_VERSION: "1.8.3"
    container_name: rid-langflow
    restart: unless-stopped
    profiles:
      - langflow
    ports:
      - "7861:7860"   # host:7861 -> container:7860 (evita conflito com processo local na 7860)
    environment:
      LANGFLOW_SUPERUSER: admin
      LANGFLOW_SUPERUSER_PASSWORD: adminpassword
      LANGFLOW_DB_PASSWORD: ${LANGFLOW_DB_PASSWORD:-langflow}
      # Mesma database rid que o Django; tabelas Langflow ficam no schema langflow (search_path no role).
      LANGFLOW_DATABASE_URL: postgresql://langflow:${LANGFLOW_DB_PASSWORD:-langflow}@db:5432/rid
    networks:
      - rid-network
    depends_on:
      db:
        condition: service_healthy
      langflow-pg-bootstrap:
        condition: service_completed_successfully
