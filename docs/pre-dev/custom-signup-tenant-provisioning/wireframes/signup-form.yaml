components:

  heading:
    type: h1
    text: "Crie a conta da sua empresa"

  login_link:
    type: paragraph
    text: "Ja tem uma conta? Entre aqui."
    link_target: /accounts/login/

  form:
    type: form
    method: POST
    action: /accounts/signup/
    csrf: required
    children:

      - field: tenant_name
        type: text
        label: "Nome da Empresa"
        required: true
        minlength: 3
        maxlength: 255
        help_text: "Sera o identificador da sua empresa na plataforma."
        autocomplete: organization
        inline_validation:
          trigger: blur
          endpoint: "/accounts/check-company/"
          param: "name"

      - field: username
        type: text
        label: "Usuario"
        required: true
        help_text: "Sera seu login. Formato: usuario@nome_da_empresa"
        autocomplete: username
        pattern: "^[a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+$"
        pattern_error: "Use o formato usuario@nome_da_empresa (ex: carlos@acme)"
        inline_validation:
          trigger: blur
          endpoint: "/accounts/check-username/"
          param: "username"

      - field: email
        type: email
        label: "Email"
        required: true
        help_text: "Email de contato da empresa. Usado para notificacoes e recuperacao de senha."
        autocomplete: email
        inline_validation:
          trigger: blur
          endpoint: "/accounts/check-email/"
          param: "email"

      - field: phone_number
        type: tel
        label: "Telefone"
        required: true
        help_text: "Com DDD. Ex: (11) 99999-9999"
        autocomplete: tel
        inputmode: numeric
        mask:
          pattern: "(XX) XXXXX-XXXX"
          fallback_pattern: "(XX) XXXX-XXXX"
          strip_to: digits_only
          js_library: vanilla

      - field: password1
        type: password
        label: "Senha"
        required: true
        minlength: 8
        help_text: "Minimo 8 caracteres."
        autocomplete: new-password

      - field: password2
        type: password
        label: "Confirmar Senha"
        required: true
        autocomplete: new-password

  submit_button:
    type: button
    subtype: submit
    label: "Criar conta da empresa"
    loading_label: "Criando..."

responsive:
  breakpoints:
    mobile:
      max_width: 767px
      form_width: "100% - 32px"
      input_height: 44px
      font_size_input: 16px
    desktop:
      min_width: 1024px
      form_width: 480px
      centered: true

notes:
  - Server-rendered Django template, nao React/SPA.
  - Validacao inline via fetch e progressive enhancement — funciona sem JS.
  - Mascara de telefone e JS puro (sem dependencia externa).
  - Endpoint de inline validation deve ser rate-limited.
  - Login via username no formato usuario@nome_da_empresa — allauth v65+ com ACCOUNT_LOGIN_METHODS={"email", "username"}.
